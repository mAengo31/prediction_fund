name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy

      - name: Pytest
        run: python -m pytest

      - name: Alembic migration against SQLite
        env:
          DATABASE_URL: sqlite:////tmp/prediction_desk_ci.db
        run: python -m alembic upgrade head

  postgres-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: prediction_desk
          POSTGRES_USER: prediction_desk
          POSTGRES_PASSWORD: prediction_desk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prediction_desk -d prediction_desk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      TEST_DATABASE_URL: postgresql+psycopg://prediction_desk:prediction_desk@localhost:5432/prediction_desk

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Alembic migration against Postgres
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: python -m alembic upgrade head

      - name: Postgres integration tests
        run: python -m pytest -m postgres
