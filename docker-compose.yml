services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prediction_desk
      POSTGRES_USER: prediction_desk
      POSTGRES_PASSWORD: prediction_desk
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - prediction_desk_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prediction_desk -d prediction_desk"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://prediction_desk:prediction_desk@postgres:5432/prediction_desk
      ENABLE_OPENAPI_DOCS: "true"
      LOG_LEVEL: INFO
      PREDICTION_DESK_API_TOKEN: local-dev-token
      REQUIRE_API_TOKEN: "false"
    ports:
      - "8000:8000"

volumes:
  prediction_desk_postgres:
