name: prediction-desk

x-app-env: &app-env
  APP_ENV: "${APP_ENV:-local}"
  APP_VERSION: "${APP_VERSION:-0.1.0}"
  DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://prediction_desk:prediction_desk@postgres:5432/prediction_desk}"
  ENABLE_OPENAPI_DOCS: "${ENABLE_OPENAPI_DOCS:-true}"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"
  PREDICTION_DESK_API_TOKEN: "${PREDICTION_DESK_API_TOKEN:-local-dev-token-change-me}"
  REQUIRE_API_TOKEN: "${REQUIRE_API_TOKEN:-false}"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-prediction_desk}"
      POSTGRES_USER: "${POSTGRES_USER:-prediction_desk}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-prediction_desk}"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - prediction_desk_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prediction_desk -d prediction_desk"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment: *app-env
    command: ["scripts/migrate.sh"]
    restart: "no"

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment: *app-env
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  prediction_desk_postgres:
